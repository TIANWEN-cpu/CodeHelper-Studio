name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # 1. Security audit (runs once, fastest feedback)
  # ---------------------------------------------------------------
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: npm audit (high & critical)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for outdated dependencies
        run: npm outdated || true

  # ---------------------------------------------------------------
  # 2. Lint + Format + Typecheck (single fast job)
  # ---------------------------------------------------------------
  lint-format-typecheck:
    name: Lint / Format / Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: TypeScript type check
        run: npm run typecheck

  # ---------------------------------------------------------------
  # 3. Unit tests -- matrix across Node 18 / 20 / 22
  # ---------------------------------------------------------------
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint-format-typecheck
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: matrix.node-version == 20
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifact
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ---------------------------------------------------------------
  # 4. Bundle size check
  # ---------------------------------------------------------------
  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    needs: lint-format-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Measure bundle size
        id: bundle
        shell: bash
        run: |
          set -euo pipefail

          RENDERER_DIR="out/renderer"
          MAIN_DIR="out/main"

          # Renderer bundle
          if [ -d "$RENDERER_DIR" ]; then
            RENDERER_SIZE=$(du -sh "$RENDERER_DIR" | cut -f1)
            RENDERER_BYTES=$(du -sb "$RENDERER_DIR" | cut -f1)
          else
            RENDERER_SIZE="N/A"
            RENDERER_BYTES=0
          fi

          # Main bundle
          if [ -d "$MAIN_DIR" ]; then
            MAIN_SIZE=$(du -sh "$MAIN_DIR" | cut -f1)
            MAIN_BYTES=$(du -sb "$MAIN_DIR" | cut -f1)
          else
            MAIN_SIZE="N/A"
            MAIN_BYTES=0
          fi

          TOTAL_BYTES=$((RENDERER_BYTES + MAIN_BYTES))
          TOTAL_KB=$((TOTAL_BYTES / 1024))

          echo "renderer_size=$RENDERER_SIZE" >> "$GITHUB_OUTPUT"
          echo "main_size=$MAIN_SIZE"      >> "$GITHUB_OUTPUT"
          echo "total_kb=$TOTAL_KB"        >> "$GITHUB_OUTPUT"

          echo "## Bundle Size Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Renderer  | $RENDERER_SIZE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Main      | $MAIN_SIZE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Total** | **${TOTAL_KB} KB** |" >> "$GITHUB_STEP_SUMMARY"

      - name: Check bundle size threshold
        shell: bash
        run: |
          MAX_KB=5120   # 5 MB threshold
          TOTAL=${{ steps.bundle.outputs.total_kb }}
          if [ "$TOTAL" -gt "$MAX_KB" ]; then
            echo "::warning::Bundle size ($TOTAL KB) exceeds threshold ($MAX_KB KB)"
          fi
          echo "Bundle total: $TOTAL KB (threshold: $MAX_KB KB)"

  # ---------------------------------------------------------------
  # 5. Build smoke test (quick check that build completes)
  # ---------------------------------------------------------------
  build-smoke:
    name: Build Smoke Test
    runs-on: ${{ matrix.os }}
    needs: lint-format-typecheck
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build renderer & main
        run: npm run build
