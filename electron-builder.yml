appId: com.codehelper.app
productName: CodeHelper
copyright: Copyright (c) 2026 TIANWEN-cpu

# App metadata
description: "AI 驱动的桌面编程助手 — 集成代码编辑器、AI 对话、题库系统、知识库检索与错题追踪"
homepage: "https://github.com/TIANWEN-cpu/CodeHelper"
author:
  name: TIANWEN-cpu
  email: "noreply@github.com"

directories:
  output: dist-release
  buildResources: resources

# Auto-update configuration (electron-updater)
publish:
  provider: github
  owner: TIANWEN-cpu
  repo: CodeHelper
  releaseType: release

# Windows build configuration
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: resources/icons/icon.png
  signAndEditExecutable: false
  # Code signing placeholder — set CSC_LINK and CSC_KEY_PASSWORD env vars on CI
  # or uncomment below for local signing:
  #   certificateFile: path/to/certificate.pfx
  #   certificatePassword: ${CSC_KEY_PASSWORD}
  #   rfc3161TimeStampServer: http://timestamp.digicert.com

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: CodeHelper
  installerIcon: resources/icons/icon.png
  uninstallerIcon: resources/icons/icon.png
  installerHeaderIcon: resources/icons/icon.png
  deleteAppDataOnUninstall: false

# macOS build configuration
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: resources/icons/icon.png
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Linux build configuration
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
  icon: resources/icons/icon.png
  category: Development
  synopsis: "AI-powered desktop programming assistant"
  description: "AI 驱动的桌面编程助手 — 集成代码编辑器、AI 对话、题库系统、知识库检索与错题追踪"

# File inclusion/exclusion
files:
  - "out/**"
  - "!node_modules/**/*.{md,ts,map}"
  - node_modules/better-sqlite3/**

extraResources:
  - from: resources/problems
    to: problems
  - from: electron/db/schema.sql
    to: db/schema.sql

asar: true
asarUnpack:
  - node_modules/better-sqlite3/**

# Compression
compression: maximum

# Electron Fuses — applied via scripts/fuse-hooks.js during build
# See: https://www.electronjs.org/docs/latest/tutorial/fuses
afterPack: scripts/after-pack.js
